name: Deploy cvt.co.ug

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme to deploy"
        required: true
        default: default
        type: choice
        options:
          - default
          - superhuman
          - tesla

concurrency:
  group: deploy-cvt-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve theme
        id: theme
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.theme }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=default" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CVT site
        run: node scripts/build-cvt.mjs ${{ steps.theme.outputs.value }}

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\n\r' | sed 's/[[:space:]]*$//')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | tr -d '\n\r' | sed 's/[[:space:]]*$//')"
          npx wrangler deploy --config wrangler.cvt.toml
